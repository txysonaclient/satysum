<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SatySum</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--blue:#5b9bd5;--blue-dk:#4580ba;--tr:0.3s ease}
    html,body{height:100%;background:#fff;color:#000;font-family:Georgia,'Times New Roman',serif;overflow:hidden}

    .page{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;opacity:0;pointer-events:none;transform:translateX(60px);transition:opacity var(--tr),transform var(--tr);display:flex;flex-direction:column}
    .page.active{opacity:1;pointer-events:all;transform:translateX(0)}

    .scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .scroll-body::-webkit-scrollbar{width:4px}
    .scroll-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}

    /* ═══ VIDEOS PAGE ═══ */
    .top-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border-bottom:2px solid #000;flex-shrink:0;z-index:10}
    .search-box{flex:1;display:flex;align-items:center;background:#ccc;border-radius:8px;padding:7px 12px;gap:6px}
    .search-box input{flex:1;border:none;background:transparent;font-size:15px;font-family:Georgia,serif;outline:none;color:#333;min-width:0}
    .search-box input::placeholder{color:#666}
    .msg-btn{background:#bbb;border:none;border-radius:8px;padding:8px 14px;font-size:15px;font-family:Georgia,serif;cursor:pointer;transition:background var(--tr);flex-shrink:0}
    .msg-btn:active{background:#999}

    .video-list{display:flex;flex-direction:column}
    .video-item{cursor:pointer;border-bottom:2.5px solid #000;transition:background 0.15s ease}
    .video-item:active{background:#f5f5f5}
    .vid-thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#e8e8e8;overflow:hidden}
    .vid-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s ease}
    .video-item:hover .vid-thumb-wrap img{transform:scale(1.03)}
    .vid-play-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.18);opacity:0;transition:opacity var(--tr)}
    .video-item:hover .vid-play-ov,.video-item:active .vid-play-ov{opacity:1}
    .play-circle{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,0.88);display:flex;align-items:center;justify-content:center}
    .play-circle svg{width:22px;height:22px;margin-left:3px}
    .vid-title-bar{padding:9px 14px 11px;font-size:15px;font-family:Georgia,serif;color:#000;border-top:2px solid #000;background:#fff}
    .empty-msg{text-align:center;padding:60px 20px;color:#888;font-family:Georgia,serif;font-size:15px;line-height:1.6}

    /* ═══ PLAYER PAGE ═══ */
    .player-vid-section{flex-shrink:0;background:#000}
    .player-vid-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden}
    #video-iframe{width:100%;height:100%;border:none;display:block}
    .player-title-bar{background:#e0e0e0;padding:9px 14px;font-size:14px;font-family:Georgia,serif;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1.5px solid #bbb}
    .player-title-text{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rotate-btn{background:#bbb;border:none;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;white-space:nowrap;font-family:Georgia,serif;transition:background var(--tr)}
    .rotate-btn.on{background:var(--blue);color:#fff}
    .sugg-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .sugg-scroll::-webkit-scrollbar{width:4px}
    .sugg-scroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
    .sugg-item{display:flex;align-items:stretch;cursor:pointer;border-bottom:2px solid #000;transition:background 0.15s ease}
    .sugg-item:active{background:#f5f5f5}
    .sugg-thumb{width:110px;flex-shrink:0;overflow:hidden;background:#eee}
    .sugg-thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .sugg-info{flex:1;padding:12px 14px;display:flex;align-items:center}
    .sugg-title{font-size:14px;font-family:Georgia,serif;color:#000;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .player-back-footer{flex-shrink:0;padding:10px 12px 14px;background:#fff;border-top:1.5px solid #ddd;display:flex;align-items:center}
    .back-btn{background:#bbb;border:none;border-radius:8px;padding:7px 16px;font-size:18px;cursor:pointer;transition:background var(--tr);font-family:Georgia,serif}
    .back-btn:active{background:#999}

    /* ═══ MESSAGES PAGE ═══ */
    .msgs-topbar{display:flex;align-items:center;justify-content:flex-end;padding:8px 12px;background:#fff;border-bottom:1px solid #ddd;flex-shrink:0}
    .videos-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:15px;font-family:Georgia,serif;cursor:pointer;transition:background var(--tr)}
    .videos-btn:hover{background:var(--blue-dk)}
    .videos-btn:active{transform:scale(0.97)}
    .msgs-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 30px}
    .msgs-scroll::-webkit-scrollbar{width:4px}
    .msgs-scroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
    .msg-group{margin-bottom:22px}
    .msg-time-label{text-align:center;font-size:13px;color:#555;margin-bottom:8px;font-family:Georgia,serif}
    .msg-bubble{background:#d0d0d0;border-radius:18px;padding:18px 20px;font-size:18px;font-family:Georgia,serif;color:#000;line-height:1.5}

    /* ═══ LOADING ═══ */
    #load{position:fixed;inset:0;background:#fff;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.4s ease}
    #load.hide{opacity:0;pointer-events:none}
    .load-logo{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 38% 38%,#f9c8e8,#d497f5 45%,#a78bfa 80%,#818cf8);display:flex;align-items:center;justify-content:center}
    .load-name{font-size:28px;font-weight:900;font-family:Arial Black,'Arial Bold',Gadget,sans-serif}
    .spinner{width:30px;height:30px;border:3px solid #ddd;border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ═══ TOAST ═══ */
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;border-radius:50px;padding:10px 22px;font-size:14px;z-index:9999;opacity:0;transition:all 0.3s ease;font-family:Georgia,serif;white-space:nowrap;pointer-events:none}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.ok{background:#27ae60}#toast.err{background:#c0392b}

    @media(max-height:500px)and(orientation:landscape){
      .player-vid-wrap{height:42vh;aspect-ratio:unset}
      .load-logo{width:60px;height:60px}
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="load">
  <div class="load-logo"><span style="font-size:42px;font-weight:900;color:#000">S</span></div>
  <div class="load-name">SatySum</div>
  <div class="spinner"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ══════════════ PAGE 1 — VIDEOS ══════════════ -->
<div id="page-videos" class="page active">
  <div class="top-bar">
    <div class="search-box">
      <span>🔍</span>
      <input type="search" id="video-search" placeholder="search" oninput="filterVideos(this.value)">
    </div>
    <button class="msg-btn" onclick="goTo('page-messages');loadMessages()">Message</button>
  </div>
  <div class="scroll-body">
    <div class="video-list" id="video-list">
      <div class="empty-msg"><div class="spinner" style="margin:40px auto"></div></div>
    </div>
  </div>
</div>

<!-- ══════════════ PAGE 2 — PLAYER ══════════════ -->
<div id="page-player" class="page">
  <div class="player-vid-section">
    <div class="player-vid-wrap">
      <iframe
        id="video-iframe"
        src=""
        frameborder="0"
        allowfullscreen="1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        style="width:100%;height:100%;border:none;display:block">
      </iframe>
    </div>
  </div>
  <div class="player-title-bar">
    <span class="player-title-text" id="player-title">Now Playing</span>
    <button class="rotate-btn" id="rotate-btn" onclick="toggleRotate()">⟳ Rotate</button>
  </div>
  <div class="sugg-scroll" id="sugg-scroll"></div>
  <div class="player-back-footer">
    <button class="back-btn" onclick="goBackFromPlayer()">← Back</button>
  </div>
</div>

<!-- ══════════════ PAGE 3 — MESSAGES ══════════════ -->
<div id="page-messages" class="page">
  <div class="msgs-topbar">
    <button class="videos-btn" onclick="goTo('page-videos')">Videos</button>
  </div>
  <div class="msgs-scroll" id="msgs-list">
    <div class="empty-msg"><div class="spinner" style="margin:40px auto"></div></div>
  </div>
</div>

<script>
// ($2a$10$tgiOZiJfZwxa.BQxpjKydO.7GR5OppdHIfLJ3bvOyz3/zPfhIyVi.) — Master Key yahan quotes ke andar daalo
const JB_MASTER_KEY = '';
// (69e49305aaba8821971534b7) — Bin ID yahan quotes ke andar daalo
const JB_BIN_ID     = '';

const DEFAULT = {
  users:[], videos:[], messages:[],
  videoViews:{}, messageReads:[],
  adminCredentials:{ username:'admin', password:'admin123' }
};

let DB         = null;
let ALL_VIDEOS = [];
let CUR_YT_URL = '';
let ROTATED    = false;
let _sv        = null;

// ─── JSONbin ───────────────────────────────────
const JB = {
  key : () => localStorage.getItem('jb_k') || '',
  bin : () => localStorage.getItem('jb_b') || '',
  setK: v  => localStorage.setItem('jb_k', v),
  setB: v  => localStorage.setItem('jb_b', v),

  async read() {
    try {
      const r = await fetch(`https://api.jsonbin.io/v3/b/${this.bin()}/latest`,
        { headers:{'X-Master-Key':this.key()} });
      if (!r.ok) return null;
      return (await r.json()).record;
    } catch { return null; }
  },

  async write(data) {
    try {
      const r = await fetch(`https://api.jsonbin.io/v3/b/${this.bin()}`, {
        method:'PUT',
        headers:{'X-Master-Key':this.key(),'Content-Type':'application/json'},
        body:JSON.stringify(data)
      });
      return r.ok;
    } catch { return false; }
  }
};

function scheduleSave() {
  if (_sv) clearTimeout(_sv);
  _sv = setTimeout(() => DB && JB.write(DB), 1200);
}

function ensureDB() {
  if (!DB.users)        DB.users        = [];
  if (!DB.videos)       DB.videos       = [];
  if (!DB.messages)     DB.messages     = [];
  if (!DB.videoViews)   DB.videoViews   = {};
  if (!DB.messageReads) DB.messageReads = [];
  if (!DB.adminCredentials) DB.adminCredentials = DEFAULT.adminCredentials;
}

// ─── Init ──────────────────────────────────────
async function init() {
  if (JB_MASTER_KEY && JB_BIN_ID) {
    JB.setK(JB_MASTER_KEY);
    JB.setB(JB_BIN_ID);
  }
  const data = await JB.read();
  if (!data) {
    hideLoading();
    G('video-list').innerHTML = '<div class="empty-msg">⚠️ Connection failed.<br>Master Key ya Bin ID code mein check karo.</div>';
    return;
  }
  DB = data;
  ensureDB();
  loadVideos();
  hideLoading();
}

function hideLoading() {
  const el = G('load');
  el.classList.add('hide');
  setTimeout(() => el.style.display='none', 450);
}

// ─── Videos ────────────────────────────────────
function ytId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
  return m ? m[1] : null;
}

function loadVideos() {
  ALL_VIDEOS = DB.videos || [];
  renderVideos(ALL_VIDEOS);
}

function renderVideos(list) {
  const el = G('video-list');
  if (!list.length) { el.innerHTML='<div class="empty-msg">No videos yet</div>'; return; }
  el.innerHTML = list.map(v => {
    const vid = ytId(v.youtubeUrl);
    const th  = vid ? `https://img.youtube.com/vi/${vid}/mqdefault.jpg` : '';
    return `<div class="video-item" onclick="playVideo('${v.id}')">
      <div class="vid-thumb-wrap">
        <img src="${th}" alt="${esc(v.title)}" loading="lazy">
        <div class="vid-play-ov">
          <div class="play-circle">
            <svg viewBox="0 0 24 24" fill="#333"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        </div>
      </div>
      <div class="vid-title-bar">${esc(v.title)}</div>
    </div>`;
  }).join('');
}

function filterVideos(q) {
  const ql = q.toLowerCase().trim();
  renderVideos(ql ? ALL_VIDEOS.filter(v=>v.title.toLowerCase().includes(ql)) : ALL_VIDEOS);
}

// ─── Player ────────────────────────────────────
function playVideo(id) {
  const v = DB.videos.find(x=>x.id===id);
  if (!v) return;
  const vid = ytId(v.youtubeUrl);
  if (!vid) return;
  if (!DB.videoViews[id]) DB.videoViews[id]=[];
  DB.videoViews[id].push(Date.now());
  scheduleSave();
  CUR_YT_URL = `https://www.youtube.com/watch?v=${vid}`;
  // youtube-nocookie.com = purana/privacy embed — zyada videos ke saath kaam karta hai
  G('video-iframe').src = `https://www.youtube-nocookie.com/embed/${vid}?rel=0&modestbranding=1&playsinline=1`;
  G('player-title').textContent = v.title;
  ROTATED = false;
  G('video-iframe').style.transform = '';
  G('rotate-btn').classList.remove('on');
  renderSuggestions(DB.videos.filter(x=>x.id!==id));
  goTo('page-player');
}

function openInYT() {
  if (CUR_YT_URL) window.open(CUR_YT_URL, '_blank');
}

function toggleRotate() {
  ROTATED = !ROTATED;
  G('video-iframe').style.transform = ROTATED ? 'rotate(90deg) scale(1.78)' : '';
  G('rotate-btn').classList.toggle('on', ROTATED);
}

function renderSuggestions(list) {
  const el = G('sugg-scroll');
  if (!list.length) { el.innerHTML='<div class="empty-msg">No more videos</div>'; return; }
  el.innerHTML = list.map(v => {
    const vid = ytId(v.youtubeUrl);
    const th  = vid ? `https://img.youtube.com/vi/${vid}/mqdefault.jpg` : '';
    return `<div class="sugg-item" onclick="playVideo('${v.id}')">
      <div class="sugg-thumb"><img src="${th}" alt="${esc(v.title)}" loading="lazy"></div>
      <div class="sugg-info"><div class="sugg-title">${esc(v.title)}</div></div>
    </div>`;
  }).join('');
}

function goBackFromPlayer() {
  G('video-iframe').src = '';
  CUR_YT_URL = '';
  goTo('page-videos');
}

// ─── Messages ──────────────────────────────────
function loadMessages() {
  const msgs = DB ? (DB.messages || []) : [];
  const el   = G('msgs-list');
  if (!msgs.length) { el.innerHTML='<div class="empty-msg">No messages yet</div>'; return; }
  el.innerHTML = [...msgs].reverse().map(m => {
    const d = new Date(m.addedAt);
    return `<div class="msg-group">
      <div class="msg-time-label">${fmtTime(d)}</div>
      <div class="msg-bubble">${esc(m.content)}</div>
    </div>`;
  }).join('');
}

// ─── Navigation ────────────────────────────────
function goTo(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  setTimeout(()=>G(id).classList.add('active'),10);
}

// ─── Helpers ───────────────────────────────────
const G = id => document.getElementById(id);

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(d) {
  const now = new Date(), yst = new Date(now);
  yst.setDate(yst.getDate()-1);
  const hm = d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  if (d.toDateString()===now.toDateString()) return `Today, ${hm}`;
  if (d.toDateString()===yst.toDateString()) return `Yesterday, ${hm}`;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+`, ${hm}`;
}

function toast(text,type='') {
  const t=G('toast'); t.textContent=text; t.className='show '+type;
  setTimeout(()=>t.className='',2600);
}

init();
</script>
</body>
</html>
